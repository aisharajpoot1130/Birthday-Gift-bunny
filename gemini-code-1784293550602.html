<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <style>
        body {
            background-color: #ffe5ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }
        
        /* Gift Box styling */
        .gift-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 20;
            transition: all 0.5s ease;
        }
        .gift-box {
            font-size: 110px;
            animation: bounce 2s infinite;
        }
        .gift-text {
            font-size: 1.5rem;
            color: #ff477e;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Birthday Card styling */
        .card {
            background: white;
            width: 85%;
            max-width: 450px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
            z-index: 10;
            display: none; 
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* Pure CSS Animated Cake */
        .cake {
            width: 120px;
            height: 90px;
            background: #f1c40f;
            border-radius: 10px 10px 0 0;
            position: relative;
            margin: 40px auto 20px auto;
            box-shadow: inset 0 10px #f39c12, 0 5px 10px rgba(0,0,0,0.1);
        }
        .cake::before {
            content: "";
            position: absolute;
            width: 130px;
            height: 20px;
            background: #e74c3c;
            bottom: 0;
            left: -5px;
            border-radius: 5px;
        }
        .candle {
            width: 10px;
            height: 40px;
            background: #3498db;
            position: absolute;
            top: -40px;
            left: 55px;
            border-radius: 3px 3px 0 0;
        }
        .flame {
            width: 14px;
            height: 20px;
            background: #e67e22;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -22px;
            left: -2px;
            animation: flicker 0.5s infinite alternate;
        }

        h1 { color: #ff477e; font-size: 2.2rem; margin: 10px 0; }
        p { color: #4f5d75; font-size: 1.1rem; line-height: 1.6; }
        .wishes { font-style: italic; color: #7a828a; margin: 12px 0; }

        /* Dhair saare Balloons Animation */
        .balloon {
            width: 45px;
            height: 55px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: absolute;
            bottom: -100px;
            animation: floatUp 7s infinite ease-in;
            opacity: 0.7;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(30deg); opacity: 0; }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        @keyframes flicker {
            0% { transform: scale(1); background: #e67e22; }
            100% { transform: scale(1.2); background: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        }
    </style>
</head>
<body>

    <!-- Surprise Gift Box -->
    <div class="gift-container" id="gift" onclick="openGift()">
        <div class="gift-box">🎁</div>
        <div class="gift-text">Tap to open your gift! ✨</div>
    </div>

    <!-- Main Birthday Card (Jo gift khulne par dikhega) -->
    <div class="card" id="birthdayCard">
        
        <!-- Pure CSS Animated Cake Element -->
        <div class="cake">
            <div class="candle"><div class="flame"></div></div>
        </div>
        
        <h1>Happy Birthday! 🎂</h1>
        <p>Dear [Naam Yahan Likhein],</p>
        
        <!-- Wishes Section -->
        <p class="wishes">"Wishing you a day as special as you are. May your year ahead be full of blessings, beautiful moments, and endless smiles!" ✨</p>
        <p class="wishes">"May all your secret prayers be answered today!" 💖</p>
        
        <p><b>With Love, <br>[Apna Naam]</b></p>
    </div>

    <!-- Bohat saare Balloons -->
    <div class="balloon" style="left: 5%; animation-delay: 0s; background: #ff477e;"></div>
    <div class="balloon" style="left: 12%; animation-delay: 2.5s; background: #ff7096;"></div>
    <div class="balloon" style="left: 22%; animation-delay: 1s; background: #fca311;"></div>
    <div class="balloon" style="left: 32%; animation-delay: 4s; background: #4ea8de;"></div>
    <div class="balloon" style="left: 42%; animation-delay: 5.5s; background: #9b5de5;"></div>
    <div class="balloon" style="left: 52%; animation-delay: 2s; background: #ff477e;"></div>
    <div class="balloon" style="left: 62%; animation-delay: 0.5s; background: #70e000;"></div>
    <div class="balloon" style="left: 72%; animation-delay: 3s; background: #4ea8de;"></div>
    <div class="balloon" style="left: 82%; animation-delay: 1.5s; background: #fca311;"></div>
    <div class="balloon" style="left: 92%; animation-delay: 4.5s; background: #9b5de5;"></div>

    <script>
        function openGift() {
            document.getElementById('gift').style.display = 'none';
            var card = document.getElementById('birthdayCard');
            card.style.display = 'block';
            setTimeout(function() {
                card.style.opacity = '1';
            }, 10);
        }
    </script>
</body>
</html>
